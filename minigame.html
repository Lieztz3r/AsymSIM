<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graveyard Shift</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>%F0%9F%92%80</text></svg>">
<style>
:root {
  /* ── GoP neon-pixel twist: indigo + cyan glow on void black ── */
  --gb0:#07060f;--gb1:#2c2766;--gb2:#6f63e0;--gb3:#5ef0e6;--gb4:#b8eef0;
  --accent:#ff4fa3;--accent-dk:#7a1d4e;--glow:94,240,230;
  --font:'Courier New','Lucida Console',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#050510;overflow:hidden;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;user-select:none;}
#screen{position:relative;width:100vw;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#game-wrap{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:5;}
#hud{width:100%;display:flex;justify-content:space-between;align-items:center;font-family:var(--font);font-size:clamp(0.45rem,1.1vw,0.7rem);letter-spacing:0.1em;color:var(--gb2);text-shadow:0 0 5px var(--gb1);padding:0 2px;}
#hud-left{display:flex;gap:1.4em;align-items:center;}
#hud-right{display:flex;gap:1.4em;}
#hud span{color:var(--gb3);}
#hud .danger{color:#ff4444!important;animation:pulse 0.5s ease-in-out infinite;}
#hud .dark-warn{color:#4488bb!important;animation:pulse 0.8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
#top-bar{position:relative;width:100%;display:flex;justify-content:center;align-items:center;height:22px;}
#btn-shotgun{
  font-family:var(--font);font-size:0.55rem;letter-spacing:0.1em;
  background:#1a1a1a;color:var(--gb2);border:1px solid var(--gb1);
  padding:2px 10px;cursor:pointer;transition:background 0.15s,color 0.15s;
  text-transform:uppercase;
}
#btn-shotgun:hover{background:var(--gb1);color:#000;}
#btn-shotgun.active{background:var(--gb2);color:#000;box-shadow:0 0 8px var(--gb2);}
#canvas-wrap{position:relative;line-height:0;border:1px solid var(--gb1);box-shadow:0 0 20px rgba(44,39,102,0.4),inset 0 0 8px rgba(0,0,0,0.8);}
#game-canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;cursor:none;}
#ui-layer{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:15;}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.8em;background:rgba(0,0,0,0.88);z-index:20;}
#overlay.hidden{display:none;}
#overlay-title{font-family:var(--font);font-size:clamp(0.8rem,2.5vw,1.6rem);color:var(--gb3);text-align:center;letter-spacing:0.1em;text-shadow:2px 2px 0 var(--gb0);line-height:1.3;}
#overlay-sub{font-family:var(--font);font-size:clamp(0.38rem,0.9vw,0.58rem);color:var(--gb2);letter-spacing:0.15em;text-transform:uppercase;animation:blink 1.1s step-end infinite;}
#overlay-stats{font-family:var(--font);font-size:clamp(0.35rem,0.8vw,0.52rem);color:var(--gb1);letter-spacing:0.1em;text-align:center;margin-top:0.3em;line-height:1.8;}
@keyframes blink{0%,100%{opacity:0.8}50%{opacity:0}}
#controls{font-family:var(--font);font-size:clamp(0.32rem,0.7vw,0.48rem);color:var(--gb1);letter-spacing:0.1em;text-align:center;line-height:1.7;}
.crt-scanlines{position:fixed;inset:0;pointer-events:none;z-index:50;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);}
.crt-vignette{position:fixed;inset:0;pointer-events:none;z-index:49;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.7) 100%);}

/* ═══ BIG BOARD TIMER (< 1 minute warning) ═══ */
#board-timer{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:18;opacity:0;transition:opacity 0.8s ease;
}
#board-timer.visible{opacity:1;}
#board-timer-text{
  font-family:var(--font);font-weight:bold;
  font-size:clamp(2.5rem,8vw,6rem);
  letter-spacing:0.08em;
  text-shadow:0 0 40px currentColor, 0 0 80px currentColor;
  mix-blend-mode:screen;
}

/* Detonators */
.detonator{position:fixed;z-index:30;font-family:var(--font);pointer-events:auto;}
.detonator-inner{
  background:#1a0000;border:2px solid #ff3300;color:#ff6600;
  padding:6px 10px;font-size:0.6rem;letter-spacing:0.1em;cursor:pointer;
  text-align:center;min-width:64px;transition:background 0.1s;
  box-shadow:0 0 10px rgba(255,50,0,0.4);
}
.detonator-inner:hover{background:#330000;}
.detonator-timer{font-size:1.1rem;font-weight:bold;color:#ff2200;display:block;margin-top:2px;}
.detonator-timer.urgent{color:#fff;animation:pulse 0.3s ease-in-out infinite;}

/* Magician */
#magician-wrap{position:fixed;z-index:40;pointer-events:none;}
#magician-canvas{display:block;image-rendering:pixelated;}
#speech-wrap{position:fixed;pointer-events:auto;z-index:41;}
.speech-bubble{
  background:#fff;border:3px solid #000;border-radius:10px;
  padding:8px 12px;font-family:var(--font);font-size:0.65rem;
  color:#000;max-width:260px;line-height:1.5;position:relative;
  box-shadow:4px 4px 0 #000;
}
.speech-bubble::after{content:'';position:absolute;bottom:-14px;left:20px;border:7px solid transparent;border-top-color:#000;}
.speech-bubble::before{content:'';position:absolute;bottom:-10px;left:22px;border:5px solid transparent;border-top-color:#fff;z-index:1;}
.speech-bubble.wrong-flash{background:#ffcccc;}
.speech-input{width:100%;border:2px solid #333;border-radius:4px;padding:3px 6px;font-family:var(--font);font-size:0.65rem;margin-top:6px;outline:none;}
.speech-input:focus{border-color:#0066cc;}
.speech-submit{margin-top:4px;padding:3px 8px;font-family:var(--font);font-size:0.6rem;background:#000;color:#fff;border:none;cursor:pointer;border-radius:3px;}
.speech-submit:hover{background:#333;}
.extra-bubble{
  position:fixed;background:#fff;border:2px solid #000;border-radius:8px;
  padding:5px 8px;font-family:var(--font);font-size:0.5rem;color:#000;
  pointer-events:none;z-index:42;animation:bubblePop 0.3s ease-out forwards;
}
@keyframes bubblePop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}

/* Floating speech ellipsis bubbles */
.speech-dot-bubble{
  position:fixed;background:#fff;border:2px solid #000;border-radius:50%;
  pointer-events:none;z-index:41;
}
@keyframes floatBob{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-5px);}
  100%{transform:translateY(0px);}
}

/* Corrupter */
#corrupter-layer{position:fixed;inset:0;pointer-events:none;z-index:35;overflow:hidden;}
.corrupter{position:absolute;width:28px;height:28px;margin:-14px 0 0 -14px;pointer-events:none;border:2px solid #1a001a;box-shadow:inset -3px -3px 0 rgba(0,0,0,0.4);image-rendering:pixelated;}
.corr-eye{position:absolute;top:7px;width:5px;height:5px;background:#000;}

/* Shotgun cursor */
#shotgun-cursor{position:fixed;pointer-events:none;z-index:60;display:none;}

/* Wrong bubbles overlay */
#wrong-bubbles{position:fixed;inset:0;pointer-events:none;z-index:43;}

/* Waveform visualizer */
#waveform{position:fixed;left:0;top:50%;transform:translateY(-50%);width:100vw;height:38vh;pointer-events:none;z-index:0;opacity:0.5;}

/* Frame transform origin for camera bop/swing */
#game-wrap{will-change:transform;transform-origin:center center;}

/* ═══ HEALTH STATION HUD ═══ */
#health-station-wrap{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  z-index:60;
  pointer-events:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  /* Back sprite never bobs, handled via JS transform for swing-only */
}
#hs-canvas{
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}

/* OSU beat circles */
.osu-circle{position:fixed;width:46px;height:46px;margin:-23px 0 0 -23px;pointer-events:auto;cursor:pointer;z-index:32;}
.osu-circle .osu-body{position:absolute;inset:0;border-radius:50%;border:3px solid #00e0ff;background:radial-gradient(circle,rgba(0,224,255,0.22),rgba(0,224,255,0.05));box-shadow:0 0 10px rgba(0,224,255,0.5);}
.osu-circle .osu-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font);font-weight:bold;font-size:1rem;color:#aef6ff;text-shadow:0 0 4px #007a8a;}
.osu-circle .osu-approach{position:absolute;left:50%;top:50%;width:46px;height:46px;margin:-23px 0 0 -23px;border-radius:50%;border:3px solid #ffffff;opacity:0.9;}
.osu-circle.hit .osu-body{border-color:#7CFC00;box-shadow:0 0 16px #7CFC00;}
.osu-circle.miss .osu-body{border-color:#ff2200;box-shadow:0 0 16px #ff2200;}
@keyframes osuPop{0%{transform:scale(1);opacity:1}100%{transform:scale(1.6);opacity:0}}
.osu-circle.resolved{animation:osuPop 0.25s ease-out forwards;}

/* Rainbow overlay */
#rainbow-overlay{
  position:absolute;inset:0;pointer-events:none;z-index:16;
  opacity:0;transition:opacity 0.5s;mix-blend-mode:color;
}

/* Shadow Hands */
#shadow-hands-layer{
  position:fixed;inset:0;pointer-events:none;z-index:45;overflow:hidden;
}
#hand-left,#hand-right{
  position:absolute;
  top:50%;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  pointer-events:none;
  /* transform set by JS */
}
#hand-left{
  left:0;
  transform-origin:left center;
}
#hand-right{
  right:0;
  transform-origin:right center;
}
</style>
</head>
<body>
<canvas id="waveform"></canvas>
<div id="screen">
  <div id="game-wrap">
    <div id="hud">
      <div id="hud-left">
        <div>DEATHS&nbsp;<span id="hud-deaths">0</span></div>
        <div>TIME&nbsp;<span id="hud-time">2:00</span></div>
        <div>TILES&nbsp;<span id="hud-steps">0</span></div>
      </div>
      <div id="hud-right">
        <div id="hud-soul-status" style="display:none">SOUL</div>
        <div id="hud-dark-status" style="display:none">DARK&nbsp;<span id="hud-dark-time">0</span></div>
        <div>ROOM&nbsp;<span id="hud-room">1</span></div>
        <div>CLEARED&nbsp;<span id="hud-cleared">0</span></div>
      </div>
    </div>
    <div id="top-bar">
      <button id="btn-shotgun">SHOTGUN [E]</button>
    </div>
    <div id="canvas-wrap">
      <canvas id="game-canvas"></canvas>
      <div id="ui-layer"></div>
      <!-- Big board timer for <1 minute warning -->
      <div id="board-timer"><span id="board-timer-text">1:00</span></div>
      <!-- Rainbow overlay -->
      <canvas id="rainbow-overlay"></canvas>
      <div id="overlay">
        <div id="overlay-title">GRAVEYARD SHIFT</div>
        <div id="overlay-stats"></div>
        <div id="overlay-sub">PRESS ANY KEY OR CLICK TO START</div>
      </div>
    </div>
    <div id="controls">WASD/ARROWS · SHIFT=RUN · E=SHOTGUN · EXIT · TRAPS · DETONATORS · BEAT CIRCLES · I=IMMUNE · M=VISION · SPACE=FLY</div>
  </div>
  <div class="crt-scanlines"></div>
  <div class="crt-vignette"></div>
</div>

<!-- Health Station HUD (fixed, bottom center) -->
<div id="health-station-wrap">
  <canvas id="hs-canvas" width="128" height="128"></canvas>
</div>

<!-- Shadow Hands Layer -->
<div id="shadow-hands-layer">
  <img id="hand-left" src="Sprites/HandLeft.png" alt="">
  <img id="hand-right" src="Sprites/HandRIght.png" alt="">
</div>

<!-- Magician DOM -->
<div id="magician-wrap" style="display:none">
  <canvas id="magician-canvas" width="100" height="100"></canvas>
</div>
<div id="speech-wrap"></div>

<!-- Corrupter layer -->
<div id="corrupter-layer"></div>

<!-- Wrong bubbles layer -->
<div id="wrong-bubbles"></div>

<!-- Shotgun cursor -->
<canvas id="shotgun-cursor" width="96" height="96"></canvas>

<script>
(function(){
'use strict';

const DEBUG = true;
const LOG_PREFIX = '[GS]';
function dbg(...args){  if(DEBUG) console.debug(LOG_PREFIX,...args); }
function info(...args){ if(DEBUG) console.info(LOG_PREFIX,...args); }
function warn(...args){ console.warn(LOG_PREFIX,...args); }
function err(...args){  console.error(LOG_PREFIX,...args); }

dbg('Graveyard Shift initializing...');

/* ══ MUSIC ══ */
let musicTracks = [];
let musicIdx = 0;
let currentAudio = null;
let musicStarted = false;

async function fetchTrackList() {
  const candidates = [];
  for(let i=1;i<=20;i++){
    candidates.push(`music/${i}.mp3`);
    candidates.push(`music/${String(i).padStart(2,'0')}.mp3`);
  }
  const lmsNames = ['LMSAssault','LMSBrawler','LMSCommander','LMSEngineer','LMSEscapee','LMSGolfer','LMSMedic','LMSRecon','LMSSniper','LMSTrapmaker'];
  lmsNames.forEach(n => candidates.push(`music/${n}.mp3`));
  ['BM1','BM2','BM3','BM4','BM5','track1','track2','track3'].forEach(n=>{ candidates.push(`music/${n}.mp3`); });
  const seen = new Set();
  const unique = candidates.filter(c=>{ if(seen.has(c)) return false; seen.add(c); return true; });
  const valid = [];
  const checks = unique.map(async(url)=>{
    try{ const r = await fetch(url,{method:'HEAD'}); if(r.ok) valid.push(url); } catch(e){}
  });
  await Promise.all(checks);
  valid.sort((a,b)=>{ const na=a.split('/').pop(); const nb=b.split('/').pop(); return na.localeCompare(nb,undefined,{numeric:true}); });
  return valid;
}

async function initMusic(){
  if(musicStarted) return;
  musicStarted = true;
  if(audioCtx.state==='suspended') audioCtx.resume();
  musicTracks = await fetchTrackList();
  if(musicTracks.length===0) return;
  musicIdx = 0;
  playTrack(0);
}

function playTrack(i){
  if(i>=musicTracks.length){ if(musicTracks.length>0) playTrack(0); else currentAudio=null; return; }
  musicIdx = i;
  if(currentAudio){ currentAudio.onended=null; currentAudio.onerror=null; try{ currentAudio.pause(); }catch(e){} currentAudio.removeAttribute('src'); }
  const url = musicTracks[i];
  const a = new Audio(url);
  a.volume = 0.45; a.loop = false;
  let advanced=false;
  const advance=()=>{ if(advanced)return; advanced=true; a.onended=null; a.onerror=null; playTrack(i+1); };
  a.onended=()=>advance();
  a.onerror=()=>{ if(advanced)return; advance(); };
  currentAudio = a;
  activeTrackUrl = url;
  currentBPM = 120;
  cameraBeat.targetSwingAmt = 1.4;
  connectAnalyser(a);
  a.play().catch(e=>{});
  if(drumOnsets[url]===undefined) detectDrumOnsets(url);
}

/* ══ BPM / DRUM DETECTION ══ */
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
const drumOnsets = {};
let activeTrackUrl = null;
let currentBPM = 120;

const analyser = audioCtx.createAnalyser();
analyser.fftSize = 1024;
analyser.smoothingTimeConstant = 0.6;
analyser.connect(audioCtx.destination);
const waveformData = new Uint8Array(analyser.fftSize);
const mediaSources = new WeakSet();
function connectAnalyser(audioEl){
  if(mediaSources.has(audioEl)) return;
  try { const src = audioCtx.createMediaElementSource(audioEl); src.connect(analyser); mediaSources.add(audioEl); } catch(e){}
}

const cameraBeat = { swingPhase:0, swingAmt:0, targetSwingAmt:0, bobImpulse:0, zoomImpulse:0, bobAmt:0, zoomAmt:0 };

async function detectDrumOnsets(url){
  if(drumOnsets[url]==='pending') return;
  drumOnsets[url]='pending';
  try {
    const response = await fetch(url);
    const arrayBuffer = await response.arrayBuffer();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    const sampleRate = audioBuffer.sampleRate;
    let mono;
    if(audioBuffer.numberOfChannels>=2){ const L=audioBuffer.getChannelData(0); const R=audioBuffer.getChannelData(1); mono=new Float32Array(L.length); for(let i=0;i<L.length;i++) mono[i]=(L[i]+R[i])*0.5; }
    else mono=audioBuffer.getChannelData(0).slice();
    const lpSize=Math.floor(sampleRate/200);
    const lp=new Float32Array(mono.length);
    let acc=0;
    for(let i=0;i<lpSize;i++) acc+=Math.abs(mono[i]);
    lp[0]=acc/lpSize;
    for(let i=1;i<mono.length-lpSize;i++){ acc+=Math.abs(mono[i+lpSize-1])-Math.abs(mono[i-1]); lp[i]=acc/lpSize; }
    const winSize=Math.floor(sampleRate*0.01);
    const energies=[];
    for(let i=0;i<lp.length-winSize;i+=winSize){ let e=0; for(let j=0;j<winSize;j++) e+=lp[i+j]*lp[i+j]; energies.push({e:e/winSize,t:i/sampleRate}); }
    const histLen=30, minGap=Math.floor(0.10/(winSize/sampleRate));
    const onsets=[]; let lastOnset=-999;
    for(let i=histLen;i<energies.length;i++){
      let avg=0,mx=0; for(let j=i-histLen;j<i;j++){avg+=energies[j].e;mx=Math.max(mx,energies[j].e);} avg/=histLen;
      const threshold=avg*1.55+mx*0.18;
      if(energies[i].e>threshold&&(i-lastOnset)>minGap){ onsets.push(energies[i].t); lastOnset=i; }
    }
    drumOnsets[url]=onsets;
    if(onsets.length>4){
      const iois=[]; for(let i=1;i<onsets.length;i++){ const d=onsets[i]-onsets[i-1]; if(d>0.2&&d<2.0) iois.push(d); }
      iois.sort((a,b)=>a-b);
      const medianIOI=iois[Math.floor(iois.length/2)]||0.5;
      let bpm=Math.round(60/medianIOI);
      while(bpm<60)bpm*=2; while(bpm>180)bpm/=2;
      if(url===activeTrackUrl) currentBPM=bpm;
    }
  } catch(e){ drumOnsets[url]=[]; }
}

const DRUM_LATENCY_OFFSET = -0.08;
function checkDrumHit(){
  if(!currentAudio||currentAudio.paused||!activeTrackUrl) return false;
  const onsets=drumOnsets[activeTrackUrl];
  if(!onsets||!onsets.length) return false;
  const t=currentAudio.currentTime - DRUM_LATENCY_OFFSET;
  const tolerance=0.055;
  let lo=0,hi=onsets.length-1;
  while(lo<hi){ const mid=(lo+hi)>>1; if(onsets[mid]<t-tolerance) lo=mid+1; else hi=mid; }
  return Math.abs(onsets[lo]-t)<tolerance;
}

function updateCameraBeat(dt){
  const beatsPerSec=(currentBPM||120)/60;
  cameraBeat.swingPhase=(cameraBeat.swingPhase+beatsPerSec*dt)%(Math.PI*2);
  const k=1-Math.exp(-3*dt);
  cameraBeat.swingAmt+=(cameraBeat.targetSwingAmt-cameraBeat.swingAmt)*k;
  if(checkDrumHit()){ cameraBeat.bobImpulse=8; cameraBeat.zoomImpulse=0.02; }
  const decayK=1-Math.exp(-18*dt);
  cameraBeat.bobAmt+=(cameraBeat.bobImpulse-cameraBeat.bobAmt)*decayK;
  cameraBeat.zoomAmt+=(cameraBeat.zoomImpulse-cameraBeat.zoomAmt)*decayK;
  cameraBeat.bobImpulse*=Math.exp(-22*dt);
  cameraBeat.zoomImpulse*=Math.exp(-22*dt);
}

const gameWrap=document.getElementById('game-wrap');
function applyCameraTransform(){
  const bob=cameraBeat.bobAmt;
  const swing=Math.sin(cameraBeat.swingPhase)*cameraBeat.swingAmt*0.9;
  const zoom=1+cameraBeat.zoomAmt;
  gameWrap.style.transform=`translateY(${bob.toFixed(2)}px) rotate(${swing.toFixed(3)}deg) scale(${zoom.toFixed(4)})`;
}

/* ══ WAVEFORM VISUALIZER ══ */
const waveCanvas=document.getElementById('waveform');
const waveCtx=waveCanvas.getContext('2d');
function resizeWaveform(){ waveCanvas.width=window.innerWidth; waveCanvas.height=Math.round(window.innerHeight*0.38); }
resizeWaveform();
window.addEventListener('resize',resizeWaveform);
let waveSynthPhase=0;
function drawWaveform(dt){
  const W=waveCanvas.width,H=waveCanvas.height,mid=H/2;
  waveCtx.clearRect(0,0,W,H);
  let live=false;
  if(currentAudio&&!currentAudio.paused&&audioCtx.state==='running'){
    analyser.getByteTimeDomainData(waveformData);
    for(let i=0;i<waveformData.length;i++){ if(waveformData[i]!==128){ live=true; break; } }
  }
  waveSynthPhase=(waveSynthPhase+dt*0.004)%(Math.PI*2);
  const beat=cameraBeat.bobAmt*0.12+cameraBeat.swingAmt*0.18;
  waveCtx.lineWidth=2;
  waveCtx.strokeStyle='rgba(139,172,15,0.85)';
  waveCtx.shadowColor='rgba(139,172,15,0.7)';
  waveCtx.shadowBlur=8;
  waveCtx.beginPath();
  const N=live?waveformData.length:240;
  for(let i=0;i<N;i++){
    const x=(i/(N-1))*W;
    let y;
    if(live){ y=mid+((waveformData[i]-128)/128)*(mid*0.92); }
    else{ const t=i/(N-1); const env=Math.sin(t*Math.PI); y=mid+Math.sin(t*Math.PI*2*9+waveSynthPhase*6)*env*(6+beat*9)+Math.sin(t*Math.PI*2*3-waveSynthPhase*3)*env*(4+beat*6); }
    if(i===0)waveCtx.moveTo(x,y); else waveCtx.lineTo(x,y);
  }
  waveCtx.stroke(); waveCtx.shadowBlur=0;
}

/* ══ PALETTE ══ */
const C={
  bg:'#050510',floor:'#0a0916',floorAlt:'#0c0b1a',
  wall:'#2c2766',wallHi:'#4a3fa0',wallShadow:'#18143a',
  exit:'#5ef0e6',exitDim:'#2a6a8a',
  player:'#5ef0e6',playerShadow:'#2c2766',hurt:'#ff6666',
  grid:'rgba(94,240,230,0.07)',

const TILE=14,COLS=37,ROWS=29;
function computeScale(mCols,mRows){
  const W=mCols*TILE,H=mRows*TILE;
  return Math.max(1,Math.min(Math.floor((window.innerWidth*0.92)/W),Math.floor((window.innerHeight*0.80)/H),3));
}

/* ══ PRNG ══ */
function makePRNG(seed){
  let s=(seed^0xdeadbeef)>>>0;
  return function(){ s+=0x6D2B79F5; let t=s; t=Math.imul(t^(t>>>15),t|1); t^=t+Math.imul(t^(t>>>7),t|61); return((t^(t>>>14))>>>0)/4294967296; };
}
function shuffle(arr,rand){ for(let i=arr.length-1;i>0;i--){const j=Math.floor(rand()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }

/* ══ BFS ══ */
function bfsDistMap(grid,mapRows,mapCols,startC,startR){
  const dist=Array.from({length:mapRows},()=>new Array(mapCols).fill(-1));
  const q=[{c:startC,r:startR}]; dist[startR][startC]=0; let qi=0;
  while(qi<q.length){ const{c,r}=q[qi++]; const d=dist[r][c]; for(const[dc,dr]of[[1,0],[-1,0],[0,1],[0,-1]]){ const nc=c+dc,nr=r+dr; if(nc<0||nc>=mapCols||nr<0||nr>=mapRows)continue; if(grid[nr][nc])continue; if(dist[nr][nc]!==-1)continue; dist[nr][nc]=d+1; q.push({c:nc,r:nr}); } }
  return dist;
}
function bfsPath(dist,mapRows,mapCols,startC,startR,endC,endR){
  if(dist[endR][endC]===-1) return [];
  const path=[]; let c=endC,r=endR;
  while(c!==startC||r!==startR){ path.unshift({c,r}); const d=dist[r][c]; let moved=false; for(const[dc,dr]of[[1,0],[-1,0],[0,1],[0,-1]]){ const nc=c+dc,nr=r+dr; if(nc<0||nc>=mapCols||nr<0||nr>=mapRows)continue; if(dist[nr][nc]===d-1){c=nc;r=nr;moved=true;break;} } if(!moved)break; }
  return path;
}

/* ══ MAZE ══ */
function generateMaze(roomIdx){
  const seed=(roomIdx*0x9e3779b9+0x13371337)>>>0;
  const rand=makePRNG(seed);
  const corridorW=roomIdx===0?2:1;
  const extraLoops=Math.min(4+roomIdx*2,18);
  const cellsX=Math.floor((COLS-1)/(corridorW+1));
  const cellsY=Math.floor((ROWS-1)/(corridorW+1));
  const mCols=cellsX*(corridorW+1)+1;
  const mRows=cellsY*(corridorW+1)+1;
  const grid=Array.from({length:mRows},()=>new Array(mCols).fill(true));
  function cellOrigin(cx,cy){return{tc:cx*(corridorW+1)+1,tr:cy*(corridorW+1)+1};}
  function carveCell(cx,cy){const{tc,tr}=cellOrigin(cx,cy);for(let dr=0;dr<corridorW;dr++)for(let dc=0;dc<corridorW;dc++)grid[tr+dr][tc+dc]=false;}
  function carvePassage(cx1,cy1,cx2,cy2){
    const{tc:tc1,tr:tr1}=cellOrigin(cx1,cy1);const{tc:tc2,tr:tr2}=cellOrigin(cx2,cy2);
    const dc=tc2-tc1,dr=tr2-tr1;
    const wc=tc1+(dc>0?corridorW:dc<0?-1:0); const wr=tr1+(dr>0?corridorW:dr<0?-1:0);
    const wallW=dc!==0?1:corridorW,wallH=dr!==0?1:corridorW;
    for(let dr2=0;dr2<wallH;dr2++)for(let dc2=0;dc2<wallW;dc2++)grid[wr+dr2][wc+dc2]=false;
  }
  const visited=Array.from({length:cellsY},()=>new Array(cellsX).fill(false));
  function backtrack(cx,cy){ visited[cy][cx]=true;carveCell(cx,cy); const dirs=shuffle([[1,0],[-1,0],[0,1],[0,-1]],rand); for(const[dx,dy]of dirs){const nx=cx+dx,ny=cy+dy;if(nx>=0&&nx<cellsX&&ny>=0&&ny<cellsY&&!visited[ny][nx]){carvePassage(cx,cy,nx,ny);backtrack(nx,ny);}}}
  backtrack(0,0);
  let loopsAdded=0;
  for(let attempt=0;attempt<1000&&loopsAdded<extraLoops;attempt++){
    const r=1+Math.floor(rand()*(mRows-2)),c=1+Math.floor(rand()*(mCols-2));
    if(!grid[r][c])continue;
    const hOk=c>0&&c<mCols-1&&!grid[r][c-1]&&!grid[r][c+1];
    const vOk=r>0&&r<mRows-1&&!grid[r-1][c]&&!grid[r+1][c];
    if(hOk||vOk){grid[r][c]=false;loopsAdded++;}
  }
  const{tc:stc,tr:str}=cellOrigin(0,0);
  const{tc:etc,tr:etr}=cellOrigin(cellsX-1,cellsY-1);
  const startPos={c:stc,r:str};
  const exitPos={c:etc+corridorW-1,r:etr+corridorW-1};
  const distFromStart=bfsDistMap(grid,mRows,mCols,startPos.c,startPos.r);
  const distFromExit=bfsDistMap(grid,mRows,mCols,exitPos.c,exitPos.r);
  const mainPath=bfsPath(distFromStart,mRows,mCols,startPos.c,startPos.r,exitPos.c,exitPos.r);
  const mainPathSet=new Set(mainPath.map(p=>`${p.c},${p.r}`));
  function floorNeighborCount(r,c){let n=0;if(r>0&&!grid[r-1][c])n++;if(r<mRows-1&&!grid[r+1][c])n++;if(c>0&&!grid[r][c-1])n++;if(c<mCols-1&&!grid[r][c+1])n++;return n;}
  const deadEnds=[];
  for(let r=1;r<mRows-1;r++)for(let c=1;c<mCols-1;c++)if(!grid[r][c]&&floorNeighborCount(r,c)===1){if((r===str&&c===stc)||(r===etr&&c===etc))continue;deadEnds.push({r,c});}
  const allFloor=[];
  for(let r=1;r<mRows-1;r++)for(let c=1;c<mCols-1;c++){if(!grid[r][c]){const ds=Math.abs(r-str)+Math.abs(c-stc),de=Math.abs(r-etr)+Math.abs(c-etc);if(ds>3&&de>3)allFloor.push({r,c});}}
  return{grid,mapRows:mRows,mapCols:mCols,startPos,exitPos,deadEnds,allFloor,rand,corridorW,distFromStart,distFromExit,mainPath,mainPathSet,mRows,mCols};
}

/* ══ TRAPS SPAWN ══ */
function spawnTraps(mazeData,roomIdx){
  const{allFloor,deadEnds,rand,mainPathSet}=mazeData;
  const diff=Math.min(roomIdx/3,1.0);
  const chokeTiles=[],ambushTiles=[],generalTiles=[];
  for(const t of allFloor){
    const key=`${t.c},${t.r}`;
    if(mainPathSet.has(key)){chokeTiles.push(t);}
    else{let adj=false;for(const[dc,dr]of[[1,0],[-1,0],[0,1],[0,-1]])if(mainPathSet.has(`${t.c+dc},${t.r+dr}`)){adj=true;break;}if(adj)ambushTiles.push(t);else generalTiles.push(t);}
  }
  const sc=shuffle([...chokeTiles],rand),sa=shuffle([...ambushTiles],rand),sg=shuffle([...generalTiles],rand);
  let ci=0,ai=0,gi=0;
  const takeC=(n)=>{const r=[];for(let i=0;i<n&&ci<sc.length;i++,ci++)r.push({...sc[ci]});return r;};
  const takeA=(n)=>{const r=[];for(let i=0;i<n&&ai<sa.length;i++,ai++)r.push({...sa[ai]});return r;};
  const takeG=(n)=>{const r=[];for(let i=0;i<n&&gi<sg.length;i++,gi++)r.push({...sg[gi]});return r;};
  const cnt=(base,bonus)=>base+Math.round(bonus*diff);
  const traps=[]; const used=new Set();
  function place(tiles,type,extra={}){for(const pos of tiles){const k=`${pos.c},${pos.r}`;if(used.has(k))continue;used.add(k);traps.push({type,r:pos.r,c:pos.c,state:'idle',timer:0,...extra});}}
  place(takeC(cnt(3,6)),'spike');
  place(takeC(cnt(2,4)),'dark');
  place(takeA(cnt(2,4)),'bomb');
  place(takeA(cnt(1,3)),'chaser');
  place(takeG(cnt(2,5)),'ice');
  const teleDeads=shuffle([...deadEnds],rand);
  const telePool=[...teleDeads,...generalTiles.filter(t=>!used.has(`${t.c},${t.r}`))];
  const teleCount=cnt(1,3); let tpIdx=0;
  for(let i=0;i<teleCount;i++){
    let found=false;
    for(let a=0;a<telePool.length&&!found;a++){
      const pa=telePool[a]; if(used.has(`${pa.c},${pa.r}`))continue;
      for(let b=a+1;b<telePool.length&&!found;b++){
        const pb=telePool[b]; if(used.has(`${pb.c},${pb.r}`))continue;
        if(Math.abs(pa.c-pb.c)+Math.abs(pa.r-pb.r)>=25){
          const pid='tp_'+tpIdx++;
          used.add(`${pa.c},${pa.r}`);used.add(`${pb.c},${pb.r}`);
          traps.push({type:'teleA',r:pa.r,c:pa.c,state:'idle',pairId:pid,linkedR:pb.r,linkedC:pb.c,cooldown:0});
          traps.push({type:'teleB',r:pb.r,c:pb.c,state:'idle',pairId:pid,linkedR:pa.r,linkedC:pa.c,cooldown:0});
          found=true;
        }
      }
    }
  }
  return traps;
}

function updateRainbowCanvas(){
  const w = canvas.offsetWidth || canvas.width;
  const h = canvas.offsetHeight || canvas.height;
  rainbowCanvas.width = w; rainbowCanvas.height = h;
  rainbowCanvas.style.width = w+'px'; rainbowCanvas.style.height = h+'px';
}

function updateRainbow(dt){
  if(rainbowStacks <= 0) {
    rainbowCanvas.style.opacity = '0';
    return;
  }
  rainbowAnimT += dt * 0.002;
  rainbowHue = (rainbowHue + dt * 0.3) % 360;
  const opacity = Math.min(rainbowStacks * 0.12, 0.75);
  rainbowCanvas.style.opacity = opacity.toFixed(3);
  const w = rainbowCanvas.width, h = rainbowCanvas.height;
  if(!w || !h) return;
  rainbowCtx.clearRect(0,0,w,h);
  const grad = rainbowCtx.createLinearGradient(
    w * Math.cos(rainbowAnimT) * 0.5 + w*0.5, 0,
    w - w * Math.cos(rainbowAnimT) * 0.5 + w*0.5, h
  );
  for(let i=0; i<=12; i++){
    const hue = (rainbowHue + i*30) % 360;
    grad.addColorStop(i/12, `hsla(${hue},100%,65%,1)`);
  }
  rainbowCtx.fillStyle = grad;
  rainbowCtx.fillRect(0,0,w,h);
}

function updateBoardTimer(){

    boardTimerText.textContent = m2+':'+s2;
    const ratio = 1 - (timeLeft / 60000);
    const r = Math.round(180 + ratio * 75);
    const g = Math.round(180 * (1-ratio));
    const b = Math.round(100 * (1-ratio));
    const alpha = 0.08 + ratio * 0.92;
    boardTimerText.style.color = `rgba(${r},${g},${b},${alpha})`;
    const glowR = Math.round(255*ratio);
    const glowG = Math.round(80*(1-ratio));
    boardTimerText.style.textShadow = `0 0 40px rgba(${glowR},${glowG},0,${alpha*0.8}), 0 0 80px rgba(${glowR},0,0,${alpha*0.4})`;

/* ══ LOG DARK SPEED ══ */
function getDarkSpeedMult(){
  if(darkSlowStack<=0||darkTimer<=0)return 1.0;
  const penalty=Math.log(1+darkSlowStack)/Math.log(2)*0.20;
  return Math.max(0.10,1.0-penalty);
}
function getEnemyFogSlowMult(ec,er){
  if(darkTimer<=0)return 1.0;
  const pc2=playerTileC(),pr2=playerTileR();
  if(Math.abs(ec-pc2)<=FOG_RADIUS&&Math.abs(er-pr2)<=FOG_RADIUS)return 1.0;
  const penalty=Math.log(1+darkSlowStack)/Math.log(2)*0.20;
  return Math.max(0.2,1.0-penalty);
}
function enemyShouldWander(ec,er){
  if(darkTimer<=0)return false;
  const pc2=playerTileC(),pr2=playerTileR();
  return!(Math.abs(ec-pc2)<=FOG_RADIUS&&Math.abs(er-pr2)<=FOG_RADIUS);
}

/* ══ DRILLER SPAWN ══ */
function spawnDrillersOnPath(count){
  const{mainPath}=mazeData;
  if(!mainPath.length)return;
  const startIdx=Math.floor(mainPath.length*0.60);
  const segment=mainPath.slice(startIdx);
  const spacing=Math.max(1,Math.floor(segment.length/count));
  for(let i=0;i<count&&i*spacing<segment.length;i++){
    const tile=segment[Math.min(i*spacing,segment.length-1)];
    drillerEnemies.push({x:tile.c*TILE+TILE/2,y:tile.r*TILE+TILE/2,c:tile.c,r:tile.r,dead:false,hp:3,moveTimer:0,MOVE_INTERVAL:600,drilling:false,drillTimer:0,drillC:0,drillR:0,targetC:tile.c,targetR:tile.r,headingToTP:false,tpTarget:null,tpCheckTimer:2000});
  }
}

function clearRoom(){

/* ══ COLLISION ══ */
function resolveAxis(posX,posY,vel,axis){
  const nx=axis==='x'?posX+vel:posX,ny=axis==='y'?posY+vel:posY;
  const left=Math.floor((nx-HALF)/TILE),right=Math.floor((nx+HALF-0.1)/TILE);
  const top=Math.floor((ny-HALF)/TILE),bottom=Math.floor((ny+HALF-0.1)/TILE);
  let hit=false;
  outer:for(let r=top;r<=bottom;r++)for(let c=left;c<=right;c++)if(isWall(c,r)){hit=true;break outer;}
  if(!hit)return{val:axis==='x'?nx:ny,hit:false};
  if(axis==='x'){const v=vel>0?right*TILE-HALF-0.5:(left+1)*TILE+HALF+0.5;return{val:v,hit:true};}
  else{const v=vel>0?bottom*TILE-HALF-0.5:(top+1)*TILE+HALF+0.5;return{val:v,hit:true};}
}
function checkExit(){
  const{exitPos}=mazeData;
  const ec=exitPos.c*TILE+TILE/2,er=exitPos.r*TILE+TILE/2;
  return Math.abs(px-ec)+Math.abs(py-er)<TILE*0.85;
}
function playerTileC(){return Math.floor(px/TILE);}
function playerTileR(){return Math.floor(py/TILE);}

/* ══ TELEPORTER HELPER ══ */
function findBestTP(entityC,entityR,targetC,targetR){
  const activeTeles=traps.filter(t=>!t.dead&&(t.type==='teleA'||t.type==='teleB')&&t.cooldown<=0);
  if(!activeTeles.length)return null;
  const directDist=Math.abs(entityC-targetC)+Math.abs(entityR-targetR);
  let best=null,bestGain=0;
  for(const tp of activeTeles){
    const toIn=Math.abs(entityC-tp.c)+Math.abs(entityR-tp.r);
    const outDist=Math.abs(tp.linkedC-targetC)+Math.abs(tp.linkedR-targetR);
    const gain=directDist-(toIn+outDist);
    if(gain>bestGain){bestGain=gain;best={tpC:tp.c,tpR:tp.r,destC:tp.linkedC,destR:tp.linkedR,tp,bestGain:gain};}
  }
  return best;
}

/* ══ TRAP ENTITY EFFECTS ══ */
function applyTrapsToEntity(ec,er){
  for(const trap of traps){
    if(trap.dead)continue;
    if(trap.type==='spike'&&trap.state==='triggered'&&trap.c===ec&&trap.r===er)return 'spike';
    if(trap.type==='bomb'&&trap.state==='exploding'&&Math.abs(trap.c-ec)<=4&&Math.abs(trap.r-er)<=4)return 'bomb';
  }
  return null;
}
function damageEnemy(en,amt){ en.hp-=amt; if(en.hp<=0) en.dead=true; }

/* ══ BFS NEXT DIR ══ */
function bfsNextDir(ec,er,tc,tr,ignoreWalls,wander){
  const{grid,mapRows,mapCols}=mazeData;
  if(wander){ const dirs=[[1,0],[-1,0],[0,1],[0,-1]].filter(([dc,dr])=>ignoreWalls||!isWall(ec+dc,er+dr)); if(!dirs.length)return{dx:0,dy:0}; const p=dirs[Math.floor(Math.random()*dirs.length)]; return{dx:p[0],dy:p[1]}; }
  if(ec===tc&&er===tr)return{dx:0,dy:0};
  const dist=Array.from({length:mapRows},()=>new Array(mapCols).fill(-1));
  dist[er][ec]=0; const q=[{c:ec,r:er}]; let qi=0;
  while(qi<q.length){ const{c,r}=q[qi++]; if(c===tc&&r===tr)break; for(const[dc,dr]of[[1,0],[-1,0],[0,1],[0,-1]]){ const nc=c+dc,nr=r+dr; if(nc<0||nc>=mapCols||nr<0||nr>=mapRows)continue; if(!ignoreWalls&&grid[nr][nc])continue; if(dist[nr][nc]!==-1)continue; dist[nr][nc]=dist[r][c]+1; q.push({c:nc,r:nr}); } }
  if(dist[tr][tc]===-1){ const dirs=[[1,0],[-1,0],[0,1],[0,-1]].filter(([dc,dr])=>ignoreWalls||!isWall(ec+dc,er+dr)); dirs.sort((a,b)=>(Math.abs(ec+a[0]-tc)+Math.abs(er+a[1]-tr))-(Math.abs(ec+b[0]-tc)+Math.abs(er+b[1]-tr))); return dirs.length?{dx:dirs[0][0],dy:dirs[0][1]}:{dx:0,dy:0}; }
  let c=tc,r=tr;
  while(true){ const d=dist[r][c]; if(d===1)return{dx:c-ec,dy:r-er}; let moved=false; for(const[dc,dr]of[[1,0],[-1,0],[0,1],[0,-1]]){ const nc=c+dc,nr=r+dr; if(nc<0||nc>=mapCols||nr<0||nr>=mapRows)continue; if(dist[nr][nc]===d-1){c=nc;r=nr;moved=true;break;} } if(!moved)break; }
  return{dx:0,dy:0};
}

/* ══ PREDICTIVE PATHING ══ */
function bfsFullPath(sc,sr,tc,tr,ignoreWalls){
  const{grid,mapRows,mapCols}=mazeData;
  if(sc===tc&&sr===tr)return[];
  const dist=Array.from({length:mapRows},()=>new Array(mapCols).fill(-1));
  dist[sr][sc]=0; const q=[{c:sc,r:sr}]; let qi=0; let reached=false;
  while(qi<q.length){ const{c,r}=q[qi++]; if(c===tc&&r===tr){reached=true;break;} for(const[dc,dr]of[[1,0],[-1,0],[0,1],[0,-1]]){ const nc=c+dc,nr=r+dr; if(nc<0||nc>=mapCols||nr<0||nr>=mapRows)continue; if(!ignoreWalls&&grid[nr][nc])continue; if(dist[nr][nc]!==-1)continue; dist[nr][nc]=dist[r][c]+1; q.push({c:nc,r:nr}); } }
  if(!reached||dist[tr][tc]===-1)return null;
  const path=[]; let c=tc,r=tr;
  while(c!==sc||r!==sr){ path.unshift({c,r}); const d=dist[r][c]; let moved=false; for(const[dc,dr]of[[1,0],[-1,0],[0,1],[0,-1]]){ const nc=c+dc,nr=r+dr; if(nc<0||nc>=mapCols||nr<0||nr>=mapRows)continue; if(dist[nr][nc]===d-1){c=nc;r=nr;moved=true;break;} } if(!moved)break; }
  return path;
}

function predictPlayerTile(lead){
  const pc=playerTileC(),pr=playerTileR();
  let pvx=0,pvy=0;
  if(keys['ArrowLeft']||keys['KeyA'])pvx=-1; if(keys['ArrowRight']||keys['KeyD'])pvx=1;
  if(keys['ArrowUp']||keys['KeyW'])pvy=-1; if(keys['ArrowDown']||keys['KeyS'])pvy=1;
  if(pvx===0&&pvy===0)return{c:pc,r:pr};
  let tc=pc,tr=pr;
  for(let i=0;i<lead;i++){ const nc=tc+pvx,nr=tr+pvy; if(isWall(nc,nr))break; tc=nc;tr=nr; }
  return{c:tc,r:tr};
}

function updateTraps(dt){
  const fly=debugFly||playerMode==='soul';
  const pc=fly?-999:playerTileC(), pr=fly?-999:playerTileR();
  for(const trap of traps){
    if(trap.dead)continue;
    if(trap.type==='spike'){
      let trigEnt=trap.c===pc&&trap.r===pr;
      if(!trigEnt)for(const en of[...enemies,...drillerEnemies,...locustEnemies,...flygareEnemies])if(!en.dead&&Math.floor(en.x/TILE)===trap.c&&Math.floor(en.y/TILE)===trap.r){trigEnt=true;break;}
      if(trap.state==='idle'){if(trigEnt){trap.state='armed';trap.timer=SPIKE_DELAY;}}
      else if(trap.state==='armed'){trap.timer-=dt;if(trap.timer<=0){trap.state='triggered';trap.timer=0;if(trap.c===pc&&trap.r===pr)killPlayer('SPIKED!');for(const en of[...enemies,...drillerEnemies,...locustEnemies,...flygareEnemies])if(!en.dead&&Math.floor(en.x/TILE)===trap.c&&Math.floor(en.y/TILE)===trap.r)damageEnemy(en,en.hp);}}
      else if(trap.state==='triggered'){trap.timer-=dt;if(trap.timer<-2000){trap.state='idle';trap.timer=0;}if(trap.c===pc&&trap.r===pr)killPlayer('SPIKED!');}
    }
    else if(trap.type==='bomb'){
      let prox=Math.abs(trap.c-pc)<=1&&Math.abs(trap.r-pr)<=1;
      if(!prox)for(const en of[...enemies,...drillerEnemies,...locustEnemies,...flygareEnemies])if(!en.dead&&Math.abs(trap.c-Math.floor(en.x/TILE))<=1&&Math.abs(trap.r-Math.floor(en.y/TILE))<=1){prox=true;break;}
      if(trap.state==='idle'){if(prox){trap.state='armed';trap.timer=BOMB_DELAY;}}
      else if(trap.state==='armed'){trap.timer-=dt;if(trap.timer<=0){trap.state='exploding';trap.timer=400;for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)setWall(trap.c+dc,trap.r+dr,false);if(Math.abs(trap.c-pc)<=4&&Math.abs(trap.r-pr)<=4)killPlayer('BLOWN UP!');for(const en of[...enemies,...drillerEnemies,...locustEnemies,...flygareEnemies])if(!en.dead&&Math.abs(trap.c-Math.floor(en.x/TILE))<=4&&Math.abs(trap.r-Math.floor(en.y/TILE))<=4)damageEnemy(en,en.hp);}}
      else if(trap.state==='exploding'){trap.timer-=dt;if(trap.timer<=0)trap.dead=true;}
    }
    else if(trap.type==='chaser'){
      if(trap.state==='idle'){if(trap.c===pc&&trap.r===pr){trap.state='armed';trap.timer=CHASER_DELAY;}}
      else if(trap.state==='armed'){trap.timer-=dt;if(trap.timer<=0){trap.dead=true;spawnEnemy(trap.c,trap.r);}}
    }
    else if(trap.type==='dark'){
      if(trap.c===pc&&trap.r===pr&&!trap.trig){ trap.trig=true; if(darkTimer>0){darkSlowStack++;} else{darkTimer=DARK_DURATION;} darkVisualTimer=DARK_FADE; }
      if(trap.c!==pc||trap.r!==pr)trap.trig=false;
    }
    else if(trap.type==='teleA'||trap.type==='teleB'){
      if(trap.cooldown>0)trap.cooldown-=dt;
      else if(trap.c===pc&&trap.r===pr){ px=trap.linkedC*TILE+TILE/2; py=trap.linkedR*TILE+TILE/2; iceDir=null; trap.cooldown=TELE_COOLDOWN; for(const t2 of traps)if((t2.type==='teleA'||t2.type==='teleB')&&t2!==trap&&t2.pairId===trap.pairId)t2.cooldown=TELE_COOLDOWN; }
    }
  }
  if(darkTimer>0){darkTimer-=dt;if(darkTimer<=0){darkTimer=0;darkSlowStack=0;}}
  if(darkVisualTimer>0){darkVisualTimer-=dt;if(darkVisualTimer<0)darkVisualTimer=0;}
}

/* ══ CHASER ENEMY ══ */
const ENEMY_BASE_SPEED=0.7,ENEMY_SPEED_GROWTH=0.00004;
const ENEMY_SIZE=TILE-4,ENEMY_HALF=(ENEMY_SIZE/2)|0;
function spawnEnemy(c,r){
  enemies.push({x:c*TILE+TILE/2,y:r*TILE+TILE/2,c,r,dead:false,hp:1,pathTimer:0,dx:0,dy:0,lifetime:0,headingToTP:false,tpTarget:null,tpCheckTimer:2000,path:null,pathIdx:0,recompute:0,goalC:-1,goalR:-1});
}
function updateEnemies(dt){
  const pc=playerTileC(),pr=playerTileR();
  for(const en of enemies){
    if(en.dead)continue;
    en.lifetime+=dt;
    const ec=Math.round(en.x/TILE-0.5)|0, er=Math.round(en.y/TILE-0.5)|0;
    const hit=applyTrapsToEntity(ec,er); if(hit){en.dead=true;continue;}
    en.tpCheckTimer-=dt;
    if(en.tpCheckTimer<=0){en.tpCheckTimer=2000;const best=findBestTP(ec,er,pc,pr);if(best&&best.bestGain>5){en.headingToTP=true;en.tpTarget=best;}}
    if(en.headingToTP&&en.tpTarget&&ec===en.tpTarget.tpC&&er===en.tpTarget.tpR&&en.tpTarget.tp.cooldown<=0){
      en.x=en.tpTarget.destC*TILE+TILE/2; en.y=en.tpTarget.destR*TILE+TILE/2;
      en.tpTarget.tp.cooldown=TELE_COOLDOWN; en.headingToTP=false; en.tpTarget=null;
      en.path=null; en.pathIdx=0; en.recompute=0;
    }
    en.pathTimer-=dt;
    const fogM=getEnemyFogSlowMult(ec,er);
    const wander=enemyShouldWander(ec,er);
    let goalC,goalR;
    if(en.headingToTP&&en.tpTarget){ goalC=en.tpTarget.tpC; goalR=en.tpTarget.tpR; }
    else { const pred=predictPlayerTile(3); goalC=pred.c; goalR=pred.r; }
    if(wander){
      if(en.pathTimer<=0||!en.path||en.pathIdx>=(en.path?en.path.length:0)){
        en.pathTimer=350;
        const dirs=[[1,0],[-1,0],[0,1],[0,-1]].filter(([dc,dr])=>!isWall(ec+dc,er+dr));
        en.path=dirs.length?[{c:ec+dirs[(Math.random()*dirs.length)|0][0],r:er+dirs[(Math.random()*dirs.length)|0][1]}]:null;
        en.pathIdx=0;
      }
    } else {
      const endC=en.path&&en.path.length?en.path[en.path.length-1].c:-99;
      const endR=en.path&&en.path.length?en.path[en.path.length-1].r:-99;
      const goalDrift=Math.abs(endC-goalC)+Math.abs(endR-goalR);
      const needPath=!en.path||en.pathIdx>=en.path.length||en.recompute<=0||goalDrift>4;
      if(needPath){ en.recompute=520+Math.random()*180; const np=bfsFullPath(ec,er,goalC,goalR,false); if(np&&np.length){ en.path=np; en.pathIdx=0; en.goalC=goalC; en.goalR=goalR; } else if(!en.path){ en.path=null; } }
    }
    en.recompute-=dt;
    const speed=(ENEMY_BASE_SPEED+en.lifetime*ENEMY_SPEED_GROWTH)*fogM;
    if(en.path&&en.pathIdx<en.path.length){
      const wp=en.path[en.pathIdx];
      const targetX=wp.c*TILE+TILE/2, targetY=wp.r*TILE+TILE/2;
      const moveX=targetX-en.x, moveY=targetY-en.y;
      const d2=Math.hypot(moveX,moveY);
      if(d2<=speed){ en.x=targetX; en.y=targetY; en.pathIdx++; }
      else { en.x+=(moveX/d2)*speed; en.y+=(moveY/d2)*speed; }
    }
    en.c=Math.floor(en.x/TILE); en.r=Math.floor(en.y/TILE);
    if(Math.abs(en.x-px)<HALF+ENEMY_HALF-1&&Math.abs(en.y-py)<HALF+ENEMY_HALF-1)killPlayer('CAUGHT!');
  }
  for(let i=enemies.length-1;i>=0;i--)if(enemies[i].dead)enemies.splice(i,1);
}

/* ══ DRILLER ══ */
function drillerNextTile(dc,dr){
  const pc=playerTileC(),pr=playerTileR();
  let pvx=0,pvy=0;
  if(keys['ArrowLeft']||keys['KeyA'])pvx=-1;if(keys['ArrowRight']||keys['KeyD'])pvx=1;
  if(keys['ArrowUp']||keys['KeyW'])pvy=-1;if(keys['ArrowDown']||keys['KeyS'])pvy=1;
  const tpc=Math.min(Math.max(pc+pvx*4,0),mazeData.mapCols-1);
  const tpr=Math.min(Math.max(pr+pvy*4,0),mazeData.mapRows-1);
  const{mapRows,mapCols}=mazeData;
  const dist=Array.from({length:mapRows},()=>new Array(mapCols).fill(-1));
  dist[dr][dc]=0; const q=[{c:dc,r:dr}]; let qi=0;
  while(qi<q.length){ const{c,r}=q[qi++]; if(c===tpc&&r===tpr)break; if(c===pc&&r===pr)break; for(const[ddc,ddr]of[[1,0],[-1,0],[0,1],[0,-1]]){ const nc=c+ddc,nr=r+ddr; if(nc<0||nc>=mapCols||nr<0||nr>=mapRows)continue; if(dist[nr][nc]!==-1)continue; dist[nr][nc]=dist[r][c]+1; q.push({c:nc,r:nr}); } }
  function nextStepTo(tc,tr){ if(dist[tr][tc]===-1)return null; let c=tc,r=tr; while(true){ const d=dist[r][c]; if(d===1)return{nc:c,nr:r}; if(d===0)return null; let moved=false; for(const[ddc,ddr]of[[1,0],[-1,0],[0,1],[0,-1]]){const nc=c+ddc,nr=r+ddr;if(nc<0||nc>=mapCols||nr<0||nr>=mapRows)continue;if(dist[nr][nc]===d-1){c=nc;r=nr;moved=true;break;}} if(!moved)break; } return null; }
  return nextStepTo(tpc,tpr)||nextStepTo(pc,pr);
}
function updateDrillers(dt){
  const pc=playerTileC(),pr=playerTileR();
  for(const dr of drillerEnemies){
    if(dr.dead)continue;
    if(Math.abs(dr.x-px)<HALF+(TILE/2)-1&&Math.abs(dr.y-py)<HALF+(TILE/2)-1){killPlayer('DRILLED!');return;}
    const ec=Math.floor(dr.x/TILE),er=Math.floor(dr.y/TILE);
    const hit=applyTrapsToEntity(ec,er); if(hit){dr.dead=true;continue;}
    if(dr.drilling){ dr.drillTimer-=dt; if(dr.drillTimer<=0){setWall(dr.drillC,dr.drillR,false);dr.c=dr.drillC;dr.r=dr.drillR;dr.x=dr.c*TILE+TILE/2;dr.y=dr.r*TILE+TILE/2;dr.drilling=false;dr.moveTimer=dr.MOVE_INTERVAL*0.5;} continue; }
    dr.moveTimer-=dt; if(dr.moveTimer>0)continue;
    dr.tpCheckTimer-=dt;
    if(dr.tpCheckTimer<=0){dr.tpCheckTimer=2000;const best=findBestTP(dr.c,dr.r,pc,pr);if(best&&best.bestGain>8){dr.headingToTP=true;dr.tpTarget=best;}}
    if(dr.headingToTP&&dr.tpTarget&&dr.c===dr.tpTarget.tpC&&dr.r===dr.tpTarget.tpR&&dr.tpTarget.tp.cooldown<=0){ dr.c=dr.tpTarget.destC;dr.r=dr.tpTarget.destR;dr.x=dr.c*TILE+TILE/2;dr.y=dr.r*TILE+TILE/2;dr.tpTarget.tp.cooldown=TELE_COOLDOWN;dr.headingToTP=false;dr.tpTarget=null;dr.moveTimer=dr.MOVE_INTERVAL;continue; }
    const fogM=getEnemyFogSlowMult(dr.c,dr.r);
    const wander=enemyShouldWander(dr.c,dr.r);
    let next;
    if(wander){const dirs=[[1,0],[-1,0],[0,1],[0,-1]].filter(([a,b])=>!isWall(dr.c+a,dr.r+b));next=dirs.length?{nc:dr.c+dirs[Math.floor(Math.random()*dirs.length)][0],nr:dr.r+dirs[Math.floor(Math.random()*dirs.length)][1]}:null;}
    else next=drillerNextTile(dr.c,dr.r);
    if(!next){dr.moveTimer=dr.MOVE_INTERVAL;continue;}
    if(isWall(next.nc,next.nr)){dr.drilling=true;dr.drillTimer=1000;dr.drillC=next.nc;dr.drillR=next.nr;}
    else{dr.c=next.nc;dr.r=next.nr;dr.x=dr.c*TILE+TILE/2;dr.y=dr.r*TILE+TILE/2;dr.moveTimer=dr.MOVE_INTERVAL/fogM;}
  }
  for(let i=drillerEnemies.length-1;i>=0;i--)if(drillerEnemies[i].dead)drillerEnemies.splice(i,1);
}

/* ══ LOCUST ══ */
const LOCUST_CHARGE_TIME=3000;
const LOCUST_SPIN_TILES=20;
const LOCUST_ALIGN_RANGE=10;

function updateLocusts(dt){
  const pc=playerTileC(),pr=playerTileR();
  for(const lo of locustEnemies){
    if(lo.dead)continue;
    lo.animT+=dt*0.003;
    const ec=Math.floor(lo.x/TILE), er=Math.floor(lo.y/TILE);
    const hit=lo.state!=='spindashing'?applyTrapsToEntity(ec,er):null;
    if(hit){lo.dead=true;continue;}
    const fogM=getEnemyFogSlowMult(ec,er);
    const wander=enemyShouldWander(ec,er);
    if(lo.state==='idle'){
      lo.idleMoveTimer-=dt;
      if(lo.idleMoveTimer<=0){ lo.idleMoveTimer=600+Math.random()*400; const dirs=[[1,0],[-1,0],[0,1],[0,-1]].filter(([dc2,dr2])=>!isWall(ec+dc2,er+dr2)); if(dirs.length){const d=dirs[Math.floor(Math.random()*dirs.length)];lo.x=(ec+d[0])*TILE+TILE/2;lo.y=(er+d[1])*TILE+TILE/2;} }
      const hDist=Math.abs(ec-pc);
      if(hDist<=LOCUST_ALIGN_RANGE&&!wander){ lo.state='aligning'; }
    }
    else if(lo.state==='aligning'){
      const curR=Math.floor(lo.y/TILE); const curC=Math.floor(lo.x/TILE);
      if(curR===pr){ lo.y=curR*TILE+TILE/2; lo.x=curC*TILE+TILE/2; lo.lockedRow=curR; lo.state='charging'; lo.chargeTimer=LOCUST_CHARGE_TIME; }
      else { const dr2=pr>curR?1:-1; const nextR=curR+dr2; if(!isWall(curC,nextR)){lo.y=nextR*TILE+TILE/2;lo.x=curC*TILE+TILE/2;} else{const{dx,dy}=bfsNextDir(curC,curR,pc,pr,false,false);const nc2=curC+dx,nr2=curR+dy;if(!isWall(nc2,nr2)){lo.x=nc2*TILE+TILE/2;lo.y=nr2*TILE+TILE/2;}} if(Math.abs(curC-pc)>LOCUST_ALIGN_RANGE+4||wander){lo.state='idle';} }
    }
    else if(lo.state==='charging'){
      lo.chargeTimer-=dt*fogM; lo.y=lo.lockedRow*TILE+TILE/2;
      if(lo.chargeTimer<=0){ const curC2=Math.floor(lo.x/TILE); lo.spinDir=pc>=curC2?1:-1; lo.state='spindashing'; lo.spinTilesLeft=LOCUST_SPIN_TILES; lo.spinStartX=lo.x; lo.spinElapsed=0; lo.spinTotalPx=LOCUST_SPIN_TILES*TILE; lo.spinDoneX=0; }
    }
    else if(lo.state==='spindashing'){
      lo.spinElapsed+=dt;
      const progress=Math.min(lo.spinElapsed/1000,1.0);
      const targetDx=lo.spinDir*lo.spinTotalPx*progress-lo.spinDoneX;
      const stepPx=targetDx;
      const row=lo.lockedRow;
      lo.y=row*TILE+TILE/2;
      let moved=0;
      while(moved<Math.abs(stepPx)){ const nx=lo.x+lo.spinDir; const nc=Math.floor(nx/TILE); const nr=Math.floor(lo.y/TILE); if(nc<0||nc>=mazeData.mapCols){lo.state='idle';break;} if(isWall(nc,nr)){setWall(nc,nr,false);} lo.x=nx; moved++; lo.spinDoneX+=lo.spinDir; lo.spinTilesLeft=LOCUST_SPIN_TILES-Math.abs((lo.x-lo.spinStartX)/TILE); if(Math.abs(lo.x-px)<HALF+(TILE/2)&&Math.abs(lo.y-py)<HALF+(TILE/2)){killPlayer('SKEWERED!');return;} if(applyTrapsToEntity(Math.floor(lo.x/TILE),Math.floor(lo.y/TILE))){lo.dead=true;break;} }
      if(progress>=1.0){lo.state='idle';}
    }
    lo.c=Math.floor(lo.x/TILE); lo.r=Math.floor(lo.y/TILE);
  }
  for(let i=locustEnemies.length-1;i>=0;i--)if(locustEnemies[i].dead)locustEnemies.splice(i,1);
}

/* ══ FLYGARE ══ */
function updateFlygare(dt){
  const pc=playerTileC(),pr=playerTileR();
  for(const fl of flygareEnemies){
    if(fl.dead)continue;
    fl.lifetime+=dt;
    const ec=Math.floor(fl.x/TILE),er=Math.floor(fl.y/TILE);
    if(!fl.flying){const hit=applyTrapsToEntity(ec,er);if(hit){fl.dead=true;continue;}}
    if(fl.flying){ fl.flyTimer-=dt; if(fl.flyTimer<=0){fl.flying=false;fl.cooldownTimer=fl.COOLDOWN_DURATION;} }
    else if(fl.cooldownTimer>0){ fl.cooldownTimer-=dt; }
    else { fl.flyCheckTimer-=dt; if(fl.flyCheckTimer<=0){fl.flyCheckTimer=3000;if(Math.random()<0.35){fl.flying=true;fl.flyTimer=fl.FLY_DURATION;}} }
    fl.pathTimer-=dt;
    const wander=!fl.flying&&enemyShouldWander(ec,er);
    const goal=fl.flying?{c:playerTileC(),r:playerTileR()}:predictPlayerTile(2);
    const endC=fl.path&&fl.path.length?fl.path[fl.path.length-1].c:-99;
    const endR=fl.path&&fl.path.length?fl.path[fl.path.length-1].r:-99;
    const drift=Math.abs(endC-goal.c)+Math.abs(endR-goal.r);
    if(fl.pathTimer<=0||!fl.path||fl.pathIdx>=(fl.path?fl.path.length:0)||drift>3){
      fl.pathTimer=fl.flying?260:480;
      if(wander){ const dirs=[[1,0],[-1,0],[0,1],[0,-1]].filter(([a,b])=>!isWall(ec+a,er+b)); fl.path=dirs.length?[{c:ec+dirs[(Math.random()*dirs.length)|0][0],r:er+dirs[(Math.random()*dirs.length)|0][1]}]:null; }
      else { fl.path=bfsFullPath(ec,er,goal.c,goal.r,fl.flying); }
      fl.pathIdx=0;
    }
    const fogM=fl.flying?1.0:getEnemyFogSlowMult(ec,er);
    const speed=(0.3+fl.lifetime*0.00001)*(fl.flying?1.25:1.0)*fogM;
    if(fl.path&&fl.pathIdx<fl.path.length){
      const wp=fl.path[fl.pathIdx];
      const tx=wp.c*TILE+TILE/2, ty=wp.r*TILE+TILE/2;
      const mx=tx-fl.x, my=ty-fl.y, d2=Math.hypot(mx,my);
      if(fl.flying){ if(d2<=speed){ fl.x=tx; fl.y=ty; fl.pathIdx++; } else { fl.x+=(mx/d2)*speed; fl.y+=(my/d2)*speed; } }
      else { const dxs=d2>0?(mx/d2)*speed:0, dys=d2>0?(my/d2)*speed:0; const rx=resolveAxis(fl.x,fl.y,dxs,'x');fl.x=rx.val; const ry=resolveAxis(fl.x,fl.y,dys,'y');fl.y=ry.val; if(d2<=speed+0.5){ fl.pathIdx++; } }
    }
    fl.c=Math.floor(fl.x/TILE); fl.r=Math.floor(fl.y/TILE);
    if(Math.abs(fl.x-px)<HALF+(TILE/2)-1&&Math.abs(fl.y-py)<HALF+(TILE/2)-1)killPlayer('SNATCHED!');
  }
  for(let i=flygareEnemies.length-1;i>=0;i--)if(flygareEnemies[i].dead)flygareEnemies.splice(i,1);
}

function spawnDetonator(){
  if(gameState!=='playing')return;

function defuseDetonator(id){
  if(shotgunActive)return;
  const idx=detonators.findIndex(d=>d.id===id);
  if(idx===-1)return;
  const d=detonators[idx];

function clearDetonators(){

}

function updateDetonators(dt){
  if(gameState!=='playing')return;

    const quantity=1+Math.floor(globalCleared/5);
    for(let i=0;i<quantity;i++)spawnDetonator();
    detonatorTimer=15000+Math.random()*15000;
  }
  for(let i=detonators.length-1;i>=0;i--){
    const d=detonators[i]; d.timer-=dt;

/* ═══════════════════════════════════════════════════
   HEALTH STATION HUD — three layered sprites
   HealthStationBack.png — static background, swing-only
   HealthStationRGBColor.png — stamina indicator (white default, black tinted here as requested)
   HealthStationIndicator.png — player state (green=alive, teal=ghost)
   All stacked 128x128, centered bottom of screen
═══════════════════════════════════════════════════ */
const hsCanvas = document.getElementById('hs-canvas');
const hsCtx = hsCanvas.getContext('2d');
const HS_SIZE = 128;

// Health station sprite loading
const hsBack = new Image();
const hsColor = new Image();
const hsIndicator = new Image();
let hsBackReady=false, hsColorReady=false, hsIndicatorReady=false;
hsBack.onload = ()=>{ hsBackReady=true; };
hsBack.onerror = ()=>{ hsBackReady=true; }; // graceful fallback
hsBack.src = 'Sprites/HealthStationBack.png';
hsColor.onload = ()=>{ hsColorReady=true; };
hsColor.onerror = ()=>{ hsColorReady=true; };
hsColor.src = 'Sprites/HealthStationRGBColor.png';
hsIndicator.onload = ()=>{ hsIndicatorReady=true; };
hsIndicator.onerror = ()=>{ hsIndicatorReady=true; };
hsIndicator.src = 'Sprites/HealthStationIndicator.png';

// Health station: swing only (no bob), so we drive it via a separate transform
const hsWrap = document.getElementById('health-station-wrap');

function drawHealthStation(){
  hsCtx.clearRect(0,0,HS_SIZE,HS_SIZE);

  // Layer 1: Back (static sprite) — always drawn
  if(hsBackReady && hsBack.complete && hsBack.naturalWidth>0){
    hsCtx.drawImage(hsBack, 0, 0, HS_SIZE, HS_SIZE);
  } else {
    // Fallback: dark panel
    hsCtx.fillStyle='#111';
    hsCtx.fillRect(0,0,HS_SIZE,HS_SIZE);
    hsCtx.strokeStyle='#2c2766';
    hsCtx.lineWidth=2;
    hsCtx.strokeRect(1,1,HS_SIZE-2,HS_SIZE-2);
  }

  // Layer 2: RGBColor (stamina indicator) — tinted black as requested
  // We draw it with multiply blend or just tint to black
  if(hsColorReady && hsColor.complete && hsColor.naturalWidth>0){
    // Draw with globalCompositeOperation to tint it black
    // Black tint: draw normally, then darken with multiply
    const pct = stamina/STAMINA_MAX;
    // Clip to only show filled portion (stamina fill from left)
    // But since this is an indicator sprite, we just tint it and clip by stamina %
    hsCtx.save();
    hsCtx.globalAlpha = 1.0;
    // Apply black tint via multiply approach
    // First draw the sprite
    hsCtx.drawImage(hsColor, 0, 0, HS_SIZE, HS_SIZE);
    // Overlay black tint (destination-in style) — use source-atop with black fill
    // Actually: to make it black, use 'multiply' composite or just draw with color tint
    // We'll use a black rectangle with multiply blend
    hsCtx.globalCompositeOperation = 'multiply';
    // For "black" color tinting: draw a near-black rect
    hsCtx.fillStyle = '#111111';
    hsCtx.fillRect(0, 0, HS_SIZE, HS_SIZE);
    hsCtx.globalCompositeOperation = 'source-over';
    // Now show stamina level: dim the right portion
    if(pct < 1.0){
      const emptyX = Math.floor(pct * HS_SIZE);
      hsCtx.fillStyle = 'rgba(0,0,0,0.7)';
      hsCtx.fillRect(emptyX, 0, HS_SIZE - emptyX, HS_SIZE);
    }
    // Low stamina: red tint
    if(staminaCooldown){
      hsCtx.fillStyle = 'rgba(255,50,50,0.3)';
      hsCtx.fillRect(0,0,HS_SIZE,HS_SIZE);
    }
    hsCtx.restore();
  } else {
    // Fallback stamina bar
    const pct = stamina/STAMINA_MAX;
    hsCtx.fillStyle = staminaCooldown ? '#ff3333' : (pct<0.3?'#ff8800':'#6f63e0');
    hsCtx.fillRect(8, HS_SIZE-20, Math.round((HS_SIZE-16)*pct), 8);
    hsCtx.strokeStyle='#444';
    hsCtx.lineWidth=1;
    hsCtx.strokeRect(8, HS_SIZE-20, HS_SIZE-16, 8);
  }

  // Layer 3: Indicator (player state)
  if(hsIndicatorReady && hsIndicator.complete && hsIndicator.naturalWidth>0){
    // Tint green for alive, teal for soul
    hsCtx.save();
    // Draw indicator base
    hsCtx.drawImage(hsIndicator, 0, 0, HS_SIZE, HS_SIZE);
    // Color tint via source-atop
    hsCtx.globalCompositeOperation = 'source-atop';
    if(playerMode === 'soul'){
      // Teal
      hsCtx.fillStyle = 'rgba(0, 200, 180, 0.7)';
    } else {
      // Green
      hsCtx.fillStyle = 'rgba(50, 200, 50, 0.65)';
    }
    hsCtx.fillRect(0, 0, HS_SIZE, HS_SIZE);
    hsCtx.globalCompositeOperation = 'source-over';
    hsCtx.restore();
  } else {
    // Fallback: dot indicator
    const alive = playerMode === 'embodied';
    hsCtx.fillStyle = alive ? '#32c832' : '#00c8b4';
    hsCtx.beginPath();
    hsCtx.arc(HS_SIZE/2, HS_SIZE/2 - 10, 10, 0, Math.PI*2);
    hsCtx.fill();
    hsCtx.fillStyle = '#fff';
    hsCtx.font = '10px monospace';
    hsCtx.textAlign='center';
    hsCtx.textBaseline='middle';
    hsCtx.fillText(alive?'LIVE':'SOUL', HS_SIZE/2, HS_SIZE/2 + 12);
  }
}

function updateHealthStationTransform(){
  // Swing only (no bob) — use the swing component of cameraBeat
  const swing = Math.sin(cameraBeat.swingPhase) * cameraBeat.swingAmt * 0.9;
  hsWrap.style.transform = `translateX(-50%) rotate(${swing.toFixed(3)}deg)`;
}

/* ═══════════════════════════════════════════════════
   SHADOW HANDS SYSTEM
   Appear after win 6, creep from left/right sides at middle height
   Duration increases every 2 wins
   Sprites: HandLeft.png, HandRight.png (scaled 1.5x)
═══════════════════════════════════════════════════ */
const handLeft = document.getElementById('hand-left');
const handRight = document.getElementById('hand-right');
let shadowHandsActive = false;
let shadowHandsPhase = 'hidden'; // 'hidden', 'creeping_in', 'holding', 'retracting'
let shadowHandsTimer = 0;
let shadowHandsInAmount = 0; // 0=fully outside, 1=fully in position
let shadowHandsImgW = 0;

const HAND_BASE_HOLD_DURATION = 3000; // 3 seconds base hold time
const HAND_CREEP_SPEED = 0.0008; // fraction per ms
const HAND_RETRACT_SPEED = 0.0012;

// Wait for images to load to get natural size
handLeft.onload = () => {
  shadowHandsImgW = handLeft.naturalWidth * 1.5;
  // Set sizes
  handLeft.style.width = (handLeft.naturalWidth * 1.5) + 'px';
  handLeft.style.height = 'auto';
};
handLeft.onerror = () => {
  // Fallback: use a placeholder width
  shadowHandsImgW = 200;
  handLeft.style.width = '200px';
};
handRight.onload = () => {
  handRight.style.width = (handRight.naturalWidth * 1.5) + 'px';
  handRight.style.height = 'auto';
};
handRight.onerror = () => {
  handRight.style.width = '200px';
};

// Initially hidden off-screen
handLeft.style.display = 'none';
handRight.style.display = 'none';

function getShadowHandHoldDuration(){
  // Base 3s, increase by 1.5s every 2 wins past 6
  const winsAbove6 = Math.max(0, globalCleared - 6);
  const increments = Math.floor(winsAbove6 / 2);
  return HAND_BASE_HOLD_DURATION + increments * 1500;
}

function triggerShadowHands(){
  if(shadowHandsPhase !== 'hidden') return;
  shadowHandsPhase = 'creeping_in';
  shadowHandsInAmount = 0;
  shadowHandsTimer = 0;
  handLeft.style.display = 'block';
  handRight.style.display = 'block';
  positionShadowHands();
}

function positionShadowHands(){
  const imgW = handLeft.offsetWidth || shadowHandsImgW || 200;
  const imgH = handLeft.offsetHeight || 150;
  const midY = window.innerHeight * 0.5;

  // Amount crept in: 0=fully outside, 1=fully visible (up to 60% of hand width)
  const maxCreep = imgW * 0.65; // how far they come in at full extension
  const leftX = -imgW + shadowHandsInAmount * maxCreep;
  const rightX = window.innerWidth - shadowHandsInAmount * maxCreep;

  handLeft.style.left = leftX + 'px';
  handLeft.style.top = (midY - imgH/2) + 'px';
  handLeft.style.right = 'auto';
  handLeft.style.transform = 'none';

  handRight.style.right = 'auto';
  handRight.style.left = rightX + 'px';
  handRight.style.top = (midY - imgH/2) + 'px';
  handRight.style.transform = 'scaleX(-1)'; // flip for right side
}

function updateShadowHands(dt){
  if(globalCleared < 6) return;

  if(shadowHandsPhase === 'hidden'){
    // Random trigger — roughly every 20 seconds after unlock
    shadowHandsTimer -= dt;
    if(shadowHandsTimer <= 0){
      shadowHandsTimer = 15000 + Math.random() * 15000;
      if(gameState === 'playing') triggerShadowHands();
    }
    return;
  }

  if(shadowHandsPhase === 'creeping_in'){
    shadowHandsInAmount = Math.min(1, shadowHandsInAmount + HAND_CREEP_SPEED * dt);
    positionShadowHands();
    if(shadowHandsInAmount >= 1){
      shadowHandsPhase = 'holding';
      shadowHandsTimer = getShadowHandHoldDuration();
    }
    return;
  }

  if(shadowHandsPhase === 'holding'){
    shadowHandsTimer -= dt;
    if(shadowHandsTimer <= 0){
      shadowHandsPhase = 'retracting';
    }
    return;
  }

  if(shadowHandsPhase === 'retracting'){
    shadowHandsInAmount = Math.max(0, shadowHandsInAmount - HAND_RETRACT_SPEED * dt);
    positionShadowHands();
    if(shadowHandsInAmount <= 0){
      shadowHandsPhase = 'hidden';
      shadowHandsTimer = 15000 + Math.random() * 15000;
      handLeft.style.display = 'none';
      handRight.style.display = 'none';
    }
    return;
  }
}

/* ═══════════════════════════════════════════════════
   OSU BEAT CIRCLES
═══════════════════════════════════════════════════ */
let osuCircles=[];
let osuTimer=0;
let osuIdCounter=0;
const OSU_APPROACH=1100;
const OSU_HIT_WINDOW=0.16;
const OSU_PENALTY=2000;

function nextBeatTime(leadSec){
  const now=(currentAudio&&!currentAudio.paused)?currentAudio.currentTime:performance.now()/1000;
  const target=now+leadSec;
  const onsets=activeTrackUrl&&Array.isArray(drumOnsets[activeTrackUrl])?drumOnsets[activeTrackUrl]:null;
  if(onsets&&onsets.length){ for(let i=0;i<onsets.length;i++){const t=onsets[i]+DRUM_LATENCY_OFFSET;if(t>=target)return{t,clock:'audio'};} }
  const period=60/(currentBPM||120);
  return{t:Math.ceil(target/period)*period,clock:onsets?'audio':'perf'};
}
function osuClock(circle){
  return circle.clock==='audio'&&currentAudio&&!currentAudio.paused?currentAudio.currentTime:performance.now()/1000;
}

function getBoardRect(){
  const canvasWrap = document.getElementById('canvas-wrap');
  return canvasWrap ? canvasWrap.getBoundingClientRect() : null;
}

function getMagicianExcludeRect(){
  const rects = [];
  const mw = document.getElementById('magician-wrap');
  const sw = document.getElementById('speech-wrap');
  if(mw && mw.style.display !== 'none') rects.push(mw.getBoundingClientRect());
  if(sw && sw.children.length > 0) rects.push(sw.getBoundingClientRect());
  document.querySelectorAll('.speech-dot-bubble').forEach(el => rects.push(el.getBoundingClientRect()));
  return rects;
}

function isPointInRect(x, y, rect, margin=30){
  return x >= rect.left - margin && x <= rect.right + margin &&
         y >= rect.top - margin && y <= rect.bottom + margin;
}

function getOsuSpawnPosition(){
  const boardRect = getBoardRect();
  const margin = 46;
  const maxAttempts = 30;
  for(let attempt = 0; attempt < maxAttempts; attempt++){
    const x = margin + Math.random() * (window.innerWidth - margin * 2);
    const y = margin + Math.random() * (window.innerHeight - margin * 2);
    if(boardRect && isPointInRect(x, y, boardRect, 0)) continue;
    const magRects = getMagicianExcludeRect();
    let blocked = false;
    for(const r of magRects){ if(isPointInRect(x, y, r, 20)){blocked=true;break;} }
    if(blocked) continue;
    // Also avoid health station area (bottom center ~128px wide, 128px tall)
    const hsArea = { left: window.innerWidth/2-80, right: window.innerWidth/2+80, top: window.innerHeight-160, bottom: window.innerHeight };
    if(x >= hsArea.left && x <= hsArea.right && y >= hsArea.top && y <= hsArea.bottom) continue;
    return {x, y};
  }
  const x = window.innerWidth * 0.1 + Math.random() * window.innerWidth * 0.8;
  const y = margin;
  return {x, y};
}

function spawnOsuCircle(){
  if(gameState!=='playing')return;
  const leadSec=OSU_APPROACH/1000;
  const beat=nextBeatTime(leadSec);
  const id=osuIdCounter++;
  const el=document.createElement('div');
  el.className='osu-circle';
  const pos = getOsuSpawnPosition();
  el.style.left=pos.x+'px'; el.style.top=pos.y+'px';
  el.innerHTML='<div class="osu-approach"></div><div class="osu-body"></div><div class="osu-num"></div>';
  document.body.appendChild(el);
  const circle={id,el,hitTime:beat.t,clock:beat.clock,resolved:false,approach:el.querySelector('.osu-approach'),num:el.querySelector('.osu-num')};
  el.addEventListener('click',()=>resolveOsu(circle,true));
  osuCircles.push(circle);
}

function resolveOsu(circle,clicked){
  if(circle.resolved)return;
  if(clicked&&shotgunActive)return;
  circle.resolved=true;
  const now=osuClock(circle);
  const err=Math.abs(now-circle.hitTime);
  const good=clicked&&err<=OSU_HIT_WINDOW;
  circle.el.classList.add(good?'hit':'miss');
  if(!good){ timeLeft=Math.max(1000,timeLeft-OSU_PENALTY); flashScreen('#00d0ff',0.18,250); }
  circle.el.classList.add('resolved');
  const el=circle.el; setTimeout(()=>el.remove(),260);
}

function clearOsu(){
  for(const c of osuCircles){ if(c.el.parentNode) c.el.parentNode.removeChild(c.el); }
  osuCircles=[];
}

function updateOsu(dt){
  if(gameState!=='playing') return;
  if(globalCleared<1)return;
  osuTimer-=dt;
  if(osuTimer<=0){ osuTimer=2600+Math.random()*2200; spawnOsuCircle(); }
  for(let i=osuCircles.length-1;i>=0;i--){
    const c=osuCircles[i];
    if(c.resolved){if(!c.el.isConnected)osuCircles.splice(i,1);continue;}
    const now=osuClock(c);
    const remaining=c.hitTime-now;
    const prog=Math.max(0,Math.min(1,1-(remaining/(OSU_APPROACH/1000))));
    const scale=1+(1-prog)*1.6;
    c.approach.style.transform=`scale(${scale.toFixed(3)})`;
    c.approach.style.opacity=(0.25+0.65*prog).toFixed(2);
    if(remaining<-OSU_HIT_WINDOW) resolveOsu(c,false);
  }
}

let dotBubbles = [];

function createDotBubbles(anchorX, anchorY){
  removeDotBubbles();

function removeDotBubbles(){
  for(const b of dotBubbles){ if(b.el.parentNode) b.el.parentNode.removeChild(b.el); }
  dotBubbles=[];
}

function updateDotBubbles(t){
  for(const b of dotBubbles){
    const phase = b.idx * 0.8;
    const bob = Math.sin(t * 3.5 + phase) * 4;
    const sway = Math.cos(t * 2.1 + phase) * 2;
    const offsetX = -35 + b.idx * (-18) + sway;
    const offsetY = -20 - b.idx * 18 + bob;
    b.el.style.left = (b.baseX + offsetX - b.size/2) + 'px';
    b.el.style.top = (b.baseY + offsetY - b.size/2) + 'px';
  }
}

function startCorrupterSystem(){
  corrupterWave=0;

function spawnCorrupterWave(){
  corrupterWave++;
  let count=baseCorrupterCount;
  if(corrupterWave%5===0)count=baseCorrupterCount*(2**(corrupterWave/5));
  count=Math.min(count,60);
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.className='corrupter';
    el.innerHTML='<div class="corr-eye" style="left:6px"></div><div class="corr-eye" style="right:6px"></div>';
    const side=Math.floor(Math.random()*4);
    let x,y;
    if(side===0){x=Math.random()*window.innerWidth;y=-10;}
    else if(side===1){x=window.innerWidth+10;y=Math.random()*window.innerHeight;}
    else if(side===2){x=Math.random()*window.innerWidth;y=window.innerHeight+10;}
    else{x=-10;y=Math.random()*window.innerHeight;}
    const hue=Math.floor(Math.random()*60)+240;
    el.style.background=`hsl(${hue},100%,60%)`;
    el.style.left=x+'px'; el.style.top=y+'px';
    corrupterLayer.appendChild(el);
    corrupters.push({el,x,y,vx:0,vy:0,hp:2,id:corrupterIdCounter++});
  }
}

function clearCorrupters(){
  for(const c of corrupters)c.el.remove();
  corrupters=[];
  corrupterLayer.innerHTML='';
}

function updateCorrupters(dt){
  if(globalCleared<5||gameState!=='playing')return;
  corrupterSpawnTimer-=dt;
  if(corrupterSpawnTimer<=0){ spawnCorrupterWave(); corrupterSpawnTimer=20000+Math.random()*10000; }
  for(let i=corrupters.length-1;i>=0;i--){
    const c=corrupters[i];
    let tx=mouseX,ty=mouseY,soulHunt=false;
    if(playerMode==='soul'){
      const rect=canvas.getBoundingClientRect();
      const soulSX=rect.left+px*canvasScale, soulSY=rect.top+py*canvasScale;
      if((c.id&1)===0){ tx=soulSX; ty=soulSY; soulHunt=true; }
    }
    const dx=tx-c.x, dy=ty-c.y;
    const dist2=Math.sqrt(dx*dx+dy*dy);
    if(dist2<1)continue;
    const speed=0.35*(1+corrupterWave*0.02);
    c.vx+=(dx/dist2)*speed*0.3; c.vy+=(dy/dist2)*speed*0.3;
    c.vx*=0.92; c.vy*=0.92;
    c.x+=c.vx; c.y+=c.vy;
    c.el.style.left=c.x+'px'; c.el.style.top=c.y+'px';
    if(dist2<24){ if(soulHunt){killPlayer('SOUL_CAUGHT');return;} killPlayer('CURSOR_CAUGHT');return; }
    if(c.x<-100||c.x>window.innerWidth+100||c.y<-100||c.y>window.innerHeight+100){ c.el.remove(); corrupters.splice(i,1); }
  }
}

const SG_BARREL_TIP=33;
const SG_RECOIL_DIST=15;
function muzzleWorld(){
  const reach=SG_BARREL_TIP-shotgunRecoil*SG_RECOIL_DIST;
  return{x:shotgunMouseX+Math.cos(shotgunAngle)*reach, y:shotgunMouseY+Math.sin(shotgunAngle)*reach};

function drawShotgunCursor(){
  sgCtx.clearRect(0,0,96,96);
  sgCtx.save();
  // Center = 48,48 on 96x96 canvas
  sgCtx.translate(48,48);
  sgCtx.rotate(shotgunAngle - shotgunRecoil*0.32);
  sgCtx.translate(-shotgunRecoil*SG_RECOIL_DIST,0);
  if(shotgunSpriteReady&&shotgunSpriteCanvas){
    // 1.5x scale: original was L=44, now L=66
    const L=66, H=L*(shotgunSprite.height/shotgunSprite.width||0.4);
    sgCtx.imageSmoothingEnabled=false;
    sgCtx.drawImage(shotgunSpriteCanvas,-L*0.42,-H/2,L,H);
  } else {
    // Fallback: scaled up 1.5x
    sgCtx.fillStyle='#888'; sgCtx.fillRect(0,-6,42,12);
    sgCtx.fillStyle='#666'; sgCtx.fillRect(0,-9,39,6); sgCtx.fillRect(0,3,39,6);

    sgCtx.fillStyle='#999'; sgCtx.fillRect(39,-7.5,9,18);
  }
  if(muzzleFlash>0.02){
    sgCtx.globalAlpha=muzzleFlash;
    const fx=SG_BARREL_TIP;
    const g=sgCtx.createRadialGradient(fx,0,0,fx,0,18*muzzleFlash+7);
    g.addColorStop(0,'#fff6c0'); g.addColorStop(0.5,'rgba(255,180,40,0.8)'); g.addColorStop(1,'rgba(255,80,0,0)');
    sgCtx.fillStyle=g;
    sgCtx.beginPath(); sgCtx.arc(fx,0,18*muzzleFlash+7,0,Math.PI*2); sgCtx.fill();
    sgCtx.globalAlpha=1;
  }
  sgCtx.restore();
}

    const a=Math.random()*Math.PI*2;
    const sp=3+Math.random()*5;
    particles.push({x:mx,y:my,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:400,maxLife:400,color:'#888',size:2});
  }
}

function angDiff(a,b){ let d=a-b; while(d>Math.PI)d-=Math.PI*2; while(d<-Math.PI)d+=Math.PI*2; return d; }

function updateShotgun(dt){
  const s=Math.min(dt,50)/16;
  const diff=angDiff(shotgunTargetAngle,shotgunAngle);
  shotgunAngVel+=diff*0.045*s;
  shotgunAngVel*=Math.pow(0.78,s);
  shotgunAngle+=shotgunAngVel*s;
  shotgunRecoilVel+=(-shotgunRecoil*38)*(s/16);
  shotgunRecoilVel*=Math.pow(0.82,s);
  shotgunRecoil+=shotgunRecoilVel*(s/16);
  if(shotgunRecoil<0){shotgunRecoil=0;if(shotgunRecoilVel<0)shotgunRecoilVel=0;}
  muzzleFlash*=Math.pow(0.80,s);

  for(let i=pellets.length-1;i>=0;i--){
    const p=pellets[i];
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.97; p.vy*=0.97; p.life-=dt;
    if(p.life<=0){pellets.splice(i,1);continue;}
    for(let j=corrupters.length-1;j>=0;j--){
      const c=corrupters[j];
      const dx=p.x-c.x,dy=p.y-c.y;
      if(dx*dx+dy*dy<18*18){
        c.hp-=2;
        for(let k=0;k<5;k++){const a=Math.random()*Math.PI*2;particles.push({x:c.x,y:c.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,life:200,maxLife:200,color:'#cc44ff',size:2});}
        if(c.hp<=0){c.el.remove();corrupters.splice(j,1);}
        pellets.splice(i,1);break;
      }
    }
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.vx*=0.95; p.vy*=0.95; p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }

  drawShotgunCursor();
}

let effectCanvas=null,effCtx=null;
function ensureEffectCanvas(){
  if(effectCanvas)return;
  effectCanvas=document.createElement('canvas');
  effectCanvas.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:55;';
  effectCanvas.width=window.innerWidth; effectCanvas.height=window.innerHeight;
  document.body.appendChild(effectCanvas);
  effCtx=effectCanvas.getContext('2d');
}
function drawShotgunEffects(){
  ensureEffectCanvas();
  effCtx.clearRect(0,0,effectCanvas.width,effectCanvas.height);
  if(pellets.length===0 && particles.length===0) return;
  for(const p of pellets){
    effCtx.globalAlpha=p.life/p.maxLife;
    effCtx.fillStyle='#ffdd88';
    effCtx.beginPath(); effCtx.arc(p.x,p.y,3,0,Math.PI*2); effCtx.fill();
  }
  for(const p of particles){
    effCtx.globalAlpha=p.smoke?0.4*(p.life/p.maxLife):p.life/p.maxLife;
    effCtx.fillStyle=p.color;
    effCtx.beginPath(); effCtx.arc(p.x,p.y,p.size*(p.smoke?p.life/p.maxLife:1),0,Math.PI*2); effCtx.fill();
  }
  effCtx.globalAlpha=1;
}

function updateShotgunPhysicsOnly(dt){
  const s=Math.min(dt,50)/16;
  shotgunRecoilVel+=(-shotgunRecoil*38)*(s/16);
  shotgunRecoilVel*=Math.pow(0.82,s);
  shotgunRecoil+=shotgunRecoilVel*(s/16);
  if(shotgunRecoil<0){shotgunRecoil=0;if(shotgunRecoilVel<0)shotgunRecoilVel=0;}
  muzzleFlash*=Math.pow(0.80,s);
  for(let i=pellets.length-1;i>=0;i--){ pellets[i].life-=dt; if(pellets[i].life<=0)pellets.splice(i,1); }
  for(let i=particles.length-1;i>=0;i--){ particles[i].life-=dt; if(particles[i].life<=0)particles.splice(i,1); }
}

/* ══ MAIN LOOP ══ */
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min(now-lastT,50); lastT=now;

  if(gameState==='playing'){
    timeLeft-=dt;
    if(timeLeft<=0){
      timeLeft=0;
      // Timer reached 0: game over, increase spawn multiplier
      enemySpawnMultiplier = Math.min(enemySpawnMultiplier * 1.5, 8.0);
      info(`Time up! Enemy spawn multiplier now ${enemySpawnMultiplier.toFixed(2)}x`);
      // Force game over regardless of state
      globalDeaths++;
      playerMode='embodied'; vessels=[];
      currentLevel=0; globalCleared=0;
      darkTimer=0; darkSlowStack=0; darkVisualTimer=0;
      clearDetonators(); clearMagician(); clearCorrupters(); clearOsu();
      gameState='gameover';
      showOverlay("TIME'S UP!",[ `DEATHS: ${globalDeaths}`,'PRESS ANY KEY TO RESTART']);
      return; // skip rest of playing logic
    }

    const slowMult=getDarkSpeedMult();
    const runMult=isRunning()?RUN_MULT:1.0;
    const speed=BASE_SPEED*slowMult*runMult;

    if(debugFly||playerMode==='soul'){
      const fsp=BASE_SPEED*1.6;
      let fdx=0,fdy=0;
      if(keys['ArrowLeft']||keys['KeyA'])fdx-=fsp;
      if(keys['ArrowRight']||keys['KeyD'])fdx+=fsp;
      if(keys['ArrowUp']||keys['KeyW'])fdy-=fsp;
      if(keys['ArrowDown']||keys['KeyS'])fdy+=fsp;
      if(fdx!==0&&fdy!==0){fdx*=0.707;fdy*=0.707;}
      px+=fdx; py+=fdy;
      px=Math.max(HALF+1,Math.min(px,mazeData.mapCols*TILE-HALF-1));
      py=Math.max(HALF+1,Math.min(py,mazeData.mapRows*TILE-HALF-1));
      iceDir=null; hurtTimer=0;
    } else {
      let dx=0,dy=0;
      if(iceDir){dx=iceDir.dx;dy=iceDir.dy;}
      else{
        if(keys['ArrowLeft']||keys['KeyA'])dx-=speed;if(keys['ArrowRight']||keys['KeyD'])dx+=speed;
        if(keys['ArrowUp']||keys['KeyW'])dy-=speed;if(keys['ArrowDown']||keys['KeyS'])dy+=speed;
      }
      if(dx!==0&&dy!==0){dx*=0.707;dy*=0.707;}
      if((dx!==0||dy!==0)&&!iceDir){const ci=getIceTile();if(ci){iceDir={dx:dx>0?1:dx<0?-1:0,dy:dy>0?1:dy<0?-1:0};if(iceDir.dx!==0)iceDir.dy=0;}}
      const rx=resolveAxis(px,py,iceDir?iceDir.dx*speed:dx,'x');if(rx.hit&&iceDir)iceDir=null;if(rx.hit)hurtTimer=8;px=rx.val;
      const ry=resolveAxis(px,py,iceDir?iceDir.dy*speed:dy,'y');if(ry.hit&&iceDir)iceDir=null;if(ry.hit)hurtTimer=8;py=ry.val;
      if(iceDir){const si=getIceTile();if(!si&&dx===0&&dy===0&&!keys['ArrowLeft']&&!keys['ArrowRight']&&!keys['ArrowUp']&&!keys['ArrowDown'])iceDir=null;}
    }

    if(playerMode==='soul'){
      for(let i=0;i<vessels.length;i++){
        const v=vessels[i];
        if(Math.abs(px-v.x)<HALF+TILE/2&&Math.abs(py-v.y)<HALF+TILE/2){
          px=v.x; py=v.y; playerMode='embodied'; vessels=[];
          break;
        }
      }
    }

    if(hurtTimer>0)hurtTimer--;
    const curC=playerTileC(),curR=playerTileR();
    if(curC!==lastTileC||curR!==lastTileR){if(lastTileC!==-1)tilesTraversed++;lastTileC=curC;lastTileR=curR;}

    if(gameState==='playing')updateTraps(dt);
    if(gameState==='playing')updateEnemies(dt);
    if(gameState==='playing')updateDrillers(dt);
    if(gameState==='playing')updateLocusts(dt);
    if(gameState==='playing')updateFlygare(dt);
    if(gameState==='playing')updateDetonators(dt);
    if(gameState==='playing')updateOsu(dt);
    if(gameState==='playing')updateStamina(dt);
    if(gameState==='playing')updateMagician(dt);
    if(gameState==='playing')updateCorrupters(dt);
    if(gameState==='playing')updateShadowHands(dt);
    if(gameState==='playing'){
      if(shotgunActive) updateShotgun(dt);
      else updateShotgunPhysicsOnly(dt);
    }
    if(gameState==='playing'&&playerMode==='embodied'&&checkExit())clearRoom();
    updateHUD();
    updateRainbow(dt);
  } else {
    updateShotgunPhysicsOnly(dt);
    updateDetonators(dt);
    updateOsu(dt);
    updateCorrupters(dt);
    updateShadowHands(dt);
    if(shotgunActive) drawShotgunCursor();
  }

  drawShotgunEffects();
  updateCameraBeat(dt/1000);
  drawWaveform(dt);

  // Draw health station
  drawHealthStation();
  updateHealthStationTransform();

  if(mazeData){
    applyCameraTransform();
    drawScene();
  }
}

/* ══ INIT ══ */
magicianSpawnTimer=50000;
detonatorTimer=25000;
// Shadow hands: init timer (won't fire until globalCleared >= 6)
shadowHandsTimer = 20000;
loadLevel(0); resetPlayer();
updateShotgunVisibility();
showOverlay('GRAVEYARD SHIFT',['SPIKE·BOMB·CHASER·ICE·TELEPORT·DARK·DRILLERS·LOCUSTS·FLYGARE·DETONATORS·SOUL·VESSELS','PRESS ANY KEY OR CLICK TO START']);
requestAnimationFrame(loop);

})();
</script>
